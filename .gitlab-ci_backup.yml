# 构建阶段
dev-build:
  stage: dev_build
  image: docker
  only: 
    - dev
    - web
  tags:
    - dev_runner
  interruptible: true
  script:
    - echo "构建docker镜像"
    - docker build --build-arg BUILD_COMMAND="yarn build:dev" -t $image_name:dev-$CI_COMMIT_SHORT_SHA .
    - echo "登录docker镜像私有仓库"
    - docker login 10.0.0.55:6001 -u $docker_login_username -p $docker_login_pwd
    - echo "推送镜像到私有仓库"
    - docker push $image_name:dev-$CI_COMMIT_SHORT_SHA
    - echo "停止正在运行的容器并移除"
    - docker ps -a|grep $container_name && docker stop $container_name && docker rm $container_name || echo "not exist"
    - echo "启动容器"
    - docker run -d --name $container_name --restart=always -p 8099:80 $image_name:dev-$CI_COMMIT_SHORT_SHA

dev-clean-work:
  stage: clean_work
  only: 
    - dev
    - web
  tags:
    - dev_runner
  script:
    - echo "清理工作开始"
    - echo "寻找镜像并删除镜像"
    # 获取该镜像名称的所有标签 并逐一删除标签关联的镜像
    - |
      # 删除所有版本为 <none> 的镜像
      dangling_images=$(docker images -f "dangling=true" -q)
      if [ -n "$dangling_images" ]; then
        echo "正在删除悬空镜像："
        echo "$dangling_images"
        docker rmi $dangling_images || echo "删除悬空镜像失败"
      else
        echo "没有悬空镜像"
      fi
      
      # 删除未被运行使用的正常版本镜像
      if docker images --format '{{.Repository}}:{{.Tag}}' | grep -q "$image_name"; then
        tags=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep "$image_name" | grep -v '<none>') 
        running_containers_image_tag=$(docker inspect --format='{{.Config.Image}}' $container_name 2>/dev/null || true)
        echo "正在删除以下的镜像 $image_name:"
        echo "$tags"
        # 循环遍历并删除每个标签对应的镜像
        for tag in $tags
        do
          # 检查该镜像是否为正在运行的容器使用的基础镜像
          echo "$tag"
          echo "$running_containers_image_tag"
          if [ "$tag" != "$running_containers_image_tag" ]; then
            echo "未使用的镜像：$tag"
            docker rmi $tag
          fi
        done
        echo "Images with all tags of $image_name have been deleted"
      else
        echo "镜像名称：$image_name，当前服务器上没有存在属于此名称的任何标签镜像"
      fi

  
    


