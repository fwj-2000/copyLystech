  paths:
    - "node_modules"
    - "dist"

variables:
  image_name: "10.0.0.55:6001/lydc-cloud-web"
  container_name: "lydc-web-docker"
  image_full_uat: "$image_name:uat-$CI_COMMIT_SHORT_SHA"
  image_full_uat_micro: "$image_name:uat-micro-$CI_COMMIT_SHORT_SHA"
  image_full_prod: "$image_name:prod-$CI_COMMIT_SHORT_SHA"

before_script:
  - which yarn || YARN_INSTALLED=false
  - |
    if command -v yarn &> /dev/null; then export YARN_INSTALLED=true; fi

